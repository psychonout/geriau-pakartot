name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build extension
        run: |
          # Build without version bump for CI
          npx babel src --out-dir dist --env-name production
          npm run copyfiles

      - name: Check if dist files are created
        run: |
          ls -la dist/
          test -f dist/content.js
          test -f dist/manifest.json
          test -f dist/popup.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: extension-build-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 30
