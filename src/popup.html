<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Autoplay Pakartot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 16px 20px;
            min-width: 240px;
            background: #fafafa;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .title {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        /* Toggle Switch Styles */
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        }

        input:checked+.slider {
            background-color: #4caf50;
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        /* Media Controls Styles */
        .media-controls {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
            gap: 16px;
            display: flex;
            flex-direction: column;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .secondary-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .control-btn.secondary {
            font-size: 24px;
        }

        .control-btn.shuffle.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        .control-btn.repeat.active {
            background: #FF9800;
            color: white;
            border-color: #FF9800;
        }

        .control-btn {
            padding: 0px;
            margin: 0px;
            border: none;
            cursor: pointer;
            font-size: 36px;
            color: #333;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 36px;
            opacity: 0.7;
            background: none;
        }

        .control-btn:hover {
            opacity: 1;
        }

        .control-btn.play-pause {
            color: white;
        }

        .status-message {
            font-size: 11px;
            color: #888;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="row">
        <span class="title">Automatinis grojimas</span>
        <label class="switch">
            <input type="checkbox" id="autoplay-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="media-controls">
        <div class="title">Grotuvo valdymas</div>
        <div class="control-buttons">
            <button class="control-btn" id="prev-album-btn" title="Ankstesnis albumas">⏮️</button>
            <button class="control-btn" id="prev-btn" title="Ankstesnis takelis">⏪</button>
            <button class="control-btn play-pause" id="play-pause-btn" title="Groti/Sustabdyti">▶️</button>
            <button class="control-btn" id="next-btn" title="Sekantis takelis">⏩</button>
            <button class="control-btn" id="next-album-btn" title="Sekantis albumas">⏭️</button>
        </div>
        <div class="secondary-controls">
            <button class="control-btn secondary shuffle" id="shuffle-btn" title="Įjungti 'Shuffle">🔀</button>
            <button class="control-btn secondary repeat" id="repeat-btn" title="Kartoti">🔁</button>
        </div>
        <div class="status-message" id="status-message">Valdykite pakartot.lt iš bet kur</div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
